<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>티스토리 보호글 자동 입력</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
<div class="container">

  <!-- ══ HEADER ══════════════════════════════════════════════════ -->
  <header>
    <img src="icons/logo_white.png" alt="AutoFill" class="logo" />
  </header>

  <!-- ══ PANEL: 초기 설정 ════════════════════════════════════════ -->
  <section id="panel-setup" class="panel hidden">

    <div class="panel-hero">
      <h2>초기 설정</h2>
      <p class="hero-desc">마스터 비밀번호로 데이터를 <strong>AES-GCM 암호화</strong>합니다.<br>비밀번호는 기기에 저장되지 않습니다.</p>
    </div>

    <!-- 마스터 비밀번호 카드 -->
    <div class="card">
      <div class="card-title">
        <svg class="card-title-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        마스터 비밀번호
      </div>
      <div class="form-group">
        <label for="setup-master">비밀번호<span class="req">*</span></label>
        <div class="input-wrap">
          <input type="password" id="setup-master" placeholder="8자 이상 입력" autocomplete="new-password" />
        </div>
      </div>
      <div class="form-group no-mb">
        <label for="setup-master-confirm">확인<span class="req">*</span></label>
        <div class="input-wrap">
          <input type="password" id="setup-master-confirm" placeholder="비밀번호 재입력" autocomplete="new-password" />
        </div>
      </div>
    </div>

    <button id="btn-setup-save" class="btn btn-primary">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
      저장
    </button>
    <div id="setup-status" class="status" role="alert" aria-live="polite"></div>
    <p class="made-by">made by 6kitty(31st)</p>
  </section>

  <!-- ══ PANEL: 잠금 해제 ════════════════════════════════════════ -->
  <section id="panel-unlock" class="panel hidden">

    <div class="lock-hero">
      <div class="lock-ring">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>
      <h2>잠금 해제</h2>
      <p class="lock-desc">마스터 비밀번호를 입력하면<br>자동 입력이 활성화됩니다.</p>
    </div>

    <div class="form-group">
      <div class="input-wrap">
        <input type="password" id="unlock-master" placeholder="마스터 비밀번호 입력" autocomplete="current-password" />
      </div>
    </div>

    <button id="btn-unlock" class="btn btn-primary">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M17 11V7a5 5 0 0 0-9.9-1"/><rect x="3" y="11" width="18" height="11" rx="2"/></svg>
      잠금 해제
    </button>

    <div id="unlock-status" class="status" role="alert" aria-live="polite"></div>
    <button id="btn-unlock-reset" class="link-btn danger">초기화</button>
  </section>

  <!-- ══ PANEL: 메인 (블로그 목록) ═══════════════════════════════ -->
  <section id="panel-main" class="panel hidden">

    <div class="active-bar">
      <div class="active-info">
        <span class="pulse-dot"></span>
        <span class="active-label">자동 입력 활성화됨</span>
      </div>
      <button id="btn-lock" class="icon-btn" title="잠금">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </button>
    </div>

    <div class="list-header">
      <span class="list-title">등록된 블로그</span>
      <span id="entry-count" class="count-chip">0</span>
    </div>

    <div id="entry-list" class="entry-list"></div>

    <button id="btn-goto-add" class="btn btn-outline">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      블로그 추가
    </button>
  </section>

  <!-- ══ PANEL: 블로그 추가 ══════════════════════════════════════ -->
  <section id="panel-add" class="panel hidden">

    <div class="back-header">
      <button id="btn-add-cancel" class="back-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <h2>블로그 추가</h2>
    </div>

    <div class="form-group">
      <label for="add-blog-id">티스토리 ID<span class="req">*</span></label>
      <div class="input-wrap has-suffix">
        <input type="text" id="add-blog-id" placeholder="myblog" autocomplete="off" spellcheck="false" />
        <span class="input-suffix">.tistory.com</span>
      </div>
    </div>
    <div class="form-group">
      <label for="add-blog-pw">보호글 비밀번호<span class="req">*</span></label>
      <div class="input-wrap">
        <input type="password" id="add-blog-pw" placeholder="보호글 비밀번호" autocomplete="new-password" />
      </div>
    </div>

    <button id="btn-add-save" class="btn btn-primary">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      추가하기
    </button>
    <div id="add-status" class="status" role="alert" aria-live="polite"></div>
  </section>

  <!-- ══ LOADING OVERLAY ═════════════════════════════════════════ -->
  <div id="loading-overlay" class="hidden">
    <div class="loader-track"><div class="loader-bar"></div></div>
    <p>암호화 처리 중…</p>
  </div>

</div><!-- /.container -->
<script type="module" src="popup.js"></script>
</body>
</html>
